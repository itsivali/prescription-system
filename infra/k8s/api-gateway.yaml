###############################################################################
# API Gateway — public-facing entrypoint for clinical / pharmacy / billing UIs.
# Hardened with: read-only FS, non-root, no privilege escalation, dropped caps,
# secret-mounted JWT keys, NetworkPolicy isolating it from any non-rules-engine
# / postgres / redis traffic.
###############################################################################
apiVersion: v1
kind: Namespace
metadata:
  name: hospital
  labels: { app.kubernetes.io/part-of: hospital-crm }
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: hospital
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hospital
  labels: { app: api-gateway, tier: edge }
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway, tier: edge }
    spec:
      serviceAccountName: api-gateway
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api-gateway
          image: ghcr.io/hospital-crm/api-gateway:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: db-credentials, key: url } }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: redis-credentials, key: url } }
            - name: JWT_PUBLIC_KEY_PATH
              value: /var/run/secrets/jwt/public.pem
          volumeMounts:
            - name: jwt-public
              mountPath: /var/run/secrets/jwt
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "1",    memory: "512Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: jwt-public
          secret: { secretName: jwt-public-key }
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hospital
spec:
  type: ClusterIP
  selector: { app: api-gateway }
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Restrict ingress to ingress-controller only; egress to rules-engine, db, redis.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-isolation
  namespace: hospital
spec:
  podSelector: { matchLabels: { app: api-gateway } }
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { name: ingress-nginx } }
      ports:
        - { protocol: TCP, port: 8080 }
  egress:
    - to:
        - podSelector: { matchLabels: { app: rules-engine } }
      ports: [{ protocol: TCP, port: 8081 }]
    - to:
        - ipBlock: { cidr: 0.0.0.0/0, except: ["169.254.0.0/16"] }
      ports:
        - { protocol: TCP, port: 5432 }   # RDS
        - { protocol: TCP, port: 6379 }   # Redis
        - { protocol: TCP, port: 53 }     # DNS
        - { protocol: UDP, port: 53 }
---
# Horizontal pod autoscaler — burst capacity for clinic open hours
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: hospital
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 65 }
