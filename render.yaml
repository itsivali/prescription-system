# Render Blueprint — deploys core-api as Docker with PostgreSQL
# Redis must be created separately in the Render dashboard
# https://docs.render.com/infrastructure-as-code
services:
  - type: web
    name: prescription-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: services/core-api
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: prescription-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_DOMAIN
        sync: false
      - key: COOKIE_SECURE
        value: "true"

databases:
  - name: prescription-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
